<div class="app-shell">
  @if (onAuthRoute()) {
    <main class="app-main app-main--auth">
      <router-outlet />
    </main>
  } @else {
    <div
      class="app-sidebar-backdrop"
      [class.is-visible]="sidebarOpen()"
      (click)="closeSidebar()"
      aria-hidden="true"
    ></div>
    <div class="app-layout" [class.app-layout--sidebar-collapsed]="sidebarCollapsed()">
      <aside
        class="app-sidebar"
        [class.is-open]="sidebarOpen()"
        [class.is-collapsed]="sidebarCollapsed()"
      >
        <a routerLink="/dashboard" class="app-sidebar__brand">
          <span class="app-sidebar__logo" aria-hidden="true">F</span>
          <span class="app-sidebar__title">FinOps</span>
        </a>

        <nav class="app-sidebar__nav" aria-label="Main navigation">
          <a
            routerLink="/dashboard"
            routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="app-sidebar__link"
          >
            <span class="app-sidebar__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                <polyline points="9 22 9 12 15 12 15 22" />
              </svg>
            </span>
            <span class="app-sidebar__label">Dashboard</span>
          </a>
          <a routerLink="/orders" routerLinkActive="is-active" class="app-sidebar__link">
            <span class="app-sidebar__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
              </svg>
            </span>
            <span class="app-sidebar__label">Orders</span>
          </a>
        </nav>

        @if (isAdmin()) {
          <p class="app-sidebar__section"><span class="app-sidebar__section-text">Administration</span></p>
          <nav class="app-sidebar__nav" aria-label="Administration">
            <a routerLink="/users" routerLinkActive="is-active" class="app-sidebar__link">
              <span class="app-sidebar__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                  <circle cx="9" cy="7" r="4" />
                  <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                  <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
              </span>
              <span class="app-sidebar__label">Users</span>
            </a>
          </nav>
        }

        <div class="app-sidebar__spacer"></div>

        <div class="app-sidebar__user">
          <div class="app-sidebar__avatar" aria-hidden="true">{{ userInitials() }}</div>
          <div class="app-sidebar__user-text">
            <span class="app-sidebar__user-name">{{ userDisplayLine() }}</span>
            <span class="app-sidebar__user-role">{{ roleLabel() }}</span>
          </div>
        </div>
        <div class="app-sidebar__footer-actions">
          @if (isAuthenticated()) {
            <button type="button" class="btn btn-ghost btn-sm app-sidebar__logout" (click)="logout()">
              <span class="app-sidebar__logout-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
              </span>
              <span class="app-sidebar__logout-text">Sign out</span>
            </button>
          } @else {
            <a routerLink="/auth/login" class="btn btn-primary btn-inline app-sidebar__login">Sign in</a>
          }
        </div>
      </aside>

      <button
        type="button"
        class="sidebar-edge-toggle"
        (click)="toggleSidebarCollapsed()"
        [attr.aria-pressed]="sidebarCollapsed()"
        [attr.aria-expanded]="!sidebarCollapsed()"
        [title]="sidebarCollapsed() ? 'Expand menu' : 'Collapse menu'"
        aria-label="Collapse or expand sidebar"
      >
        @if (sidebarCollapsed()) {
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2">
            <polyline points="9 18 15 12 9 6" />
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2">
            <polyline points="15 18 9 12 15 6" />
          </svg>
        }
      </button>

      <div class="app-layout__main">
        <header class="app-topbar">
          <div class="app-topbar__leading">
            <button
              type="button"
              class="app-topbar__menu"
              (click)="toggleSidebar()"
              aria-label="Open or close menu"
            >
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
              </svg>
            </button>
          </div>
          <div class="app-topbar__center">
            <div class="app-topbar__search-wrap">
              <span class="app-topbar__search-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="11" cy="11" r="8" />
                  <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
              </span>
              <input
                type="search"
                class="app-topbar__search"
                placeholder="Search orders…"
                disabled
                title="Global search coming soon"
              />
            </div>
          </div>
          <div class="app-topbar__trailing">
            <div class="app-topbar__user">
              <div class="app-topbar__avatar" aria-hidden="true">{{ userInitials() }}</div>
              <div class="app-topbar__user-meta">
                <span class="app-topbar__user-name">{{ userDisplayLine() }}</span>
                <span class="app-topbar__user-role">{{ roleLabel() }}</span>
              </div>
            </div>
          </div>
        </header>

        <main class="app-main-inner">
          <router-outlet />
        </main>
      </div>
    </div>
  }
</div>
